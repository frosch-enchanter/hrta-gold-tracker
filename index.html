<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HRTA Gold Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f0; color: #1a1a1a; padding: 24px; }
    h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
    .sub { font-size: 13px; color: #666; margin-bottom: 24px; }
    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .metric { background: #fff; border-radius: 10px; padding: 16px; border: 1px solid #e5e5e5; }
    .metric-label { font-size: 12px; color: #888; margin-bottom: 6px; }
    .metric-value { font-size: 22px; font-weight: 500; }
    .metric-sub { font-size: 11px; color: #aaa; margin-top: 4px; }
    .card { background: #fff; border-radius: 10px; padding: 20px; border: 1px solid #e5e5e5; margin-bottom: 20px; }
    select { font-size: 13px; padding: 7px 12px; border-radius: 8px; border: 1px solid #ddd; background: #fff; cursor: pointer; }
    .chart-wrap { height: 280px; }
    .up { color: #1a9e6e; } .down { color: #d95030; }
    .tag { font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
    .tag-gold { background: #faeeda; color: #854f0b; }
    .tag-prime { background: #e6f1fb; color: #185fa5; }
    .section-title { font-size: 14px; font-weight: 500; margin-bottom: 12px; }
    .loading { text-align: center; padding: 40px; color: #888; font-size: 14px; }
    .last-update { font-size: 12px; color: #aaa; }
    input[type="date"] { font-size: 13px; padding: 7px 12px; border-radius: 8px; border: 1px solid #ddd; background: #fff; cursor: pointer; color: #1a1a1a; }
    .controls-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
    .separator { color: #ccc; font-size: 13px; }
    .btn { font-size: 13px; padding: 7px 14px; border-radius: 8px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-weight: 500; }
    .btn:hover { background: #f5f5f0; }
    .btn-green { background: #1a9e6e; color: #fff; border-color: #1a9e6e; }
    .btn-green:hover { background: #158a5e; }

    /* Table desktop */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 10px 12px; border-bottom: 1px solid #eee; color: #888; font-weight: 500; white-space: nowrap; }
    td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; white-space: nowrap; }
    tr:last-child td { border-bottom: none; }

    /* Mobile */
    @media (max-width: 600px) {
      body { padding: 12px; }
      h1 { font-size: 17px; }
      .metrics { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .metric { padding: 12px; }
      .metric-value { font-size: 17px; }
      .card { padding: 14px; }
      .chart-wrap { height: 220px; }
      select, input[type="date"] { font-size: 12px; padding: 6px 8px; width: 100%; }
      .controls-row { flex-direction: column; align-items: stretch; gap: 6px; }
      .separator { display: none; }
      .btn { width: 100%; text-align: center; padding: 9px; font-size: 13px; }

      /* Tabel mobile — card style per baris */
      table, thead, tbody, th, td, tr { display: block; }
      thead { display: none; }
      tr { background: #fff; border: 1px solid #eee; border-radius: 8px; margin-bottom: 10px; padding: 10px 12px; }
      td { border: none; padding: 4px 0; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
      td::before {
        content: attr(data-label);
        font-size: 11px;
        color: #888;
        font-weight: 500;
        flex-shrink: 0;
        margin-right: 8px;
      }
    }
  </style>
</head>
<body>

<h1>HRTA Gold Price Tracker</h1>
<p class="sub">Data diperbarui otomatis setiap 3 jam dari hrtagold.id</p>

<div class="metrics">
  <div class="metric">
    <div class="metric-label" id="label-price">Harga Jual (1gr Gold)</div>
    <div class="metric-value" id="m-price">—</div>
    <div class="metric-sub last-update" id="m-date">Memuat...</div>
  </div>
  <div class="metric">
    <div class="metric-label" id="label-buyback">Buyback (1gr Gold)</div>
    <div class="metric-value" id="m-buyback">—</div>
    <div class="metric-sub">Harga beli kembali</div>
  </div>
  <div class="metric">
    <div class="metric-label">Spread</div>
    <div class="metric-value" id="m-spread">—</div>
    <div class="metric-sub">Selisih jual vs buyback</div>
  </div>
  <div class="metric">
    <div class="metric-label" id="label-change">Perubahan</div>
    <div class="metric-value" id="m-change">—</div>
    <div class="metric-sub" id="m-change-sub">vs update sebelumnya</div>
  </div>
</div>

<!-- Card Grafik -->
<div class="card">
  <!-- Baris 1: Filter utama -->
  <div class="controls-row">
    <select id="gramasi-select">
      <option value="0.1">0.1 gram</option>
      <option value="0.25">0.25 gram</option>
      <option value="0.5">0.5 gram</option>
      <option value="1" selected>1 gram</option>
      <option value="2">2 gram</option>
      <option value="5">5 gram</option>
      <option value="10">10 gram</option>
      <option value="25">25 gram</option>
      <option value="50">50 gram</option>
      <option value="100">100 gram</option>
      <option value="125">125 gram</option>
      <option value="150">150 gram</option>
      <option value="175">175 gram</option>
      <option value="200">200 gram</option>
      <option value="250">250 gram</option>
      <option value="500">500 gram</option>
      <option value="1000">1000 gram</option>
    </select>
    <select id="series-select">
      <option value="Gold">Gold</option>
      <option value="Prime">Prime</option>
    </select>
    <span class="separator">|</span>
    <select id="range-select" onchange="toggleDatePicker(this.value)">
      <option value="7">7 hari terakhir</option>
      <option value="14">14 hari terakhir</option>
      <option value="30" selected>30 hari terakhir</option>
      <option value="0">Semua data</option>
      <option value="custom">Pilih tanggal...</option>
    </select>
    <span class="separator">|</span>
    <button class="btn btn-green" onclick="exportCSV()">Export CSV</button>
    <button class="btn" onclick="exportJSON()">Export JSON</button>
  </div>
  <!-- Baris 2: Date picker (muncul hanya saat "Pilih tanggal...") -->
  <div id="date-picker" style="display:none; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:16px; padding:12px; background:#f9f9f7; border-radius:8px; border:1px solid #eee;">
    <span style="font-size:13px; color:#888;">Dari</span>
    <input type="date" id="date-from" style="width:150px">
    <span style="font-size:13px; color:#888;">s/d</span>
    <input type="date" id="date-to" style="width:150px">
    <button class="btn btn-green" onclick="applyDateFilter()">Update</button>
    <button class="btn" onclick="resetDateFilter()">Reset</button>
  </div>
  <p class="section-title">Grafik Harga Jual vs Buyback</p>
  <div class="chart-wrap">
    <canvas id="chart"></canvas>
  </div>
</div>

<!-- Card Tabel -->
<div class="card">
  <p class="section-title">Riwayat Lengkap</p>
  <div id="table-wrap"><div class="loading">Memuat data...</div></div>
</div>

<script>
const USERNAME = 'frosch-enchanter';
const REPO = 'hrta-gold-tracker';
const CSV_URL = `https://raw.githubusercontent.com/${USERNAME}/${REPO}/main/gold_history.csv`;

let allData = [];
let chart = null;

function fmt(n) { return 'Rp ' + Math.round(n).toLocaleString('id-ID'); }
function fmtDate(s) {
  const d = new Date(s);
  return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' }) +
    ' ' + d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
}

async function loadCSV() {
  const res = await fetch(CSV_URL + '?t=' + Date.now());
  const text = await res.text();
  const lines = text.trim().split('\n');
  return lines.slice(1).map(line => {
    const cols = line.split(',');
    return {
      tanggal: cols[0],
      series: cols[1],
      gramasi: parseFloat(cols[2]),
      harga_jual: parseInt(cols[3]),
      harga_buyback: parseInt(cols[4])
    };
  });
}

function getFiltered() {
  const gramasi = parseFloat(document.getElementById('gramasi-select').value);
  const series = document.getElementById('series-select').value;
  const range = document.getElementById('range-select').value;
  let data = allData.filter(r => r.gramasi === gramasi && r.series === series);
  data.sort((a, b) => new Date(a.tanggal) - new Date(b.tanggal));
  if (range === 'custom') {
    const from = document.getElementById('date-from').value;
    const to = document.getElementById('date-to').value;
    if (from) data = data.filter(r => r.tanggal >= from);
    if (to) data = data.filter(r => r.tanggal.slice(0, 10) <= to);
  } else if (parseInt(range) > 0) {
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - parseInt(range));
    data = data.filter(r => new Date(r.tanggal) >= cutoff);
  }
  return data;
}

function updateMetrics() {
  const gramasi = parseFloat(document.getElementById('gramasi-select').value);
  const series = document.getElementById('series-select').value;
  const label = gramasi + 'gr';
  let filtered = allData.filter(r => r.gramasi === gramasi && r.series === series);
  filtered.sort((a, b) => new Date(a.tanggal) - new Date(b.tanggal));
  if (!filtered.length) return;
  const last = filtered[filtered.length - 1];
  const prev = filtered.length > 1 ? filtered[filtered.length - 2] : null;
  document.getElementById('label-price').textContent = `Harga Jual (${label} ${series})`;
  document.getElementById('label-buyback').textContent = `Buyback (${label} ${series})`;
  document.getElementById('m-price').textContent = fmt(last.harga_jual);
  document.getElementById('m-buyback').textContent = fmt(last.harga_buyback);
  document.getElementById('m-spread').textContent =
    (((last.harga_jual - last.harga_buyback) / last.harga_jual) * 100).toFixed(1) + '%';
  document.getElementById('m-date').textContent = 'Update: ' + fmtDate(last.tanggal);
  if (prev) {
    const diff = last.harga_jual - prev.harga_jual;
    const pct = ((diff / prev.harga_jual) * 100).toFixed(2);
    if (diff > 0) {
      document.getElementById('m-change').textContent = `▲ ${fmt(diff)} (+${pct}%)`;
      document.getElementById('m-change').style.color = '#1a9e6e';
    } else if (diff < 0) {
      document.getElementById('m-change').textContent = `▼ ${fmt(Math.abs(diff))} (${pct}%)`;
      document.getElementById('m-change').style.color = '#d95030';
    } else {
      document.getElementById('m-change').textContent = 'Tidak ada perubahan';
      document.getElementById('m-change').style.color = '#aaa';
    }
    document.getElementById('m-change-sub').textContent = 'vs update sebelumnya';
  } else {
    document.getElementById('m-change').textContent = '—';
    document.getElementById('m-change-sub').textContent = 'Belum ada data pembanding';
  }
}

function renderChart(data) {
  const labels = data.map(r => {
    const d = new Date(r.tanggal);
    return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'short' }) +
      ' ' + d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
  });
  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('chart').getContext('2d'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Harga Jual', data: data.map(r => r.harga_jual), borderColor: '#3266ad', backgroundColor: 'rgba(50,102,173,0.07)', fill: true, tension: 0.3, pointRadius: data.length > 40 ? 0 : 3, borderWidth: 2 },
        { label: 'Buyback', data: data.map(r => r.harga_buyback), borderColor: '#1a9e6e', backgroundColor: 'rgba(26,158,110,0.05)', fill: true, tension: 0.3, pointRadius: data.length > 40 ? 0 : 3, borderWidth: 2, borderDash: [5, 3] }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { font: { size: 12 } } } },
      scales: {
        y: { ticks: { callback: v => 'Rp ' + (v / 1000000).toFixed(2) + 'jt', font: { size: 11 } }, grid: { color: 'rgba(0,0,0,0.05)' } },
        x: { ticks: { font: { size: 10 }, autoSkip: true, maxTicksLimit: 10 }, grid: { display: false } }
      }
    }
  });
}

function renderTable(data) {
  const wrap = document.getElementById('table-wrap');
  if (!data.length) { wrap.innerHTML = '<div class="loading">Belum ada data untuk filter ini.</div>'; return; }
  const rows = [...data].reverse().map((r, i, arr) => {
    const prev = arr[i + 1];
    let change = '—';
    if (prev) {
      const diff = r.harga_jual - prev.harga_jual;
      const pct = ((diff / prev.harga_jual) * 100).toFixed(2);
      if (diff > 0) change = `<span class="up">▲ ${fmt(diff)} (+${pct}%)</span>`;
      else if (diff < 0) change = `<span class="down">▼ ${fmt(Math.abs(diff))} (${pct}%)</span>`;
      else change = '<span style="color:#aaa">Tetap</span>';
    }
    const tag = r.series === 'Gold' ? 'tag-gold' : 'tag-prime';
    return `<tr>
      <td data-label="Waktu">${fmtDate(r.tanggal)}</td>
      <td data-label="Series"><span class="tag ${tag}">${r.series}</span></td>
      <td data-label="Gramasi">${r.gramasi}gr</td>
      <td data-label="Harga Jual">${fmt(r.harga_jual)}</td>
      <td data-label="Buyback">${fmt(r.harga_buyback)}</td>
      <td data-label="Spread">${(((r.harga_jual - r.harga_buyback) / r.harga_jual) * 100).toFixed(1)}%</td>
      <td data-label="Perubahan">${change}</td>
    </tr>`;
  });
  wrap.innerHTML = `<table>
    <thead><tr><th>Waktu</th><th>Series</th><th>Gramasi</th><th>Harga Jual</th><th>Buyback</th><th>Spread</th><th>Perubahan</th></tr></thead>
    <tbody>${rows.join('')}</tbody>
  </table>`;
}

function refresh() {
  const data = getFiltered();
  updateMetrics();
  renderChart(data);
  renderTable(data);
}

function toggleDatePicker(val) {
  const picker = document.getElementById('date-picker');
  picker.style.display = val === 'custom' ? 'flex' : 'none';
  if (val !== 'custom') refresh();
}

function applyDateFilter() { refresh(); }

function resetDateFilter() {
  document.getElementById('date-from').value = '';
  document.getElementById('date-to').value = '';
  refresh();
}

function getFilterLabel() {
  const g = document.getElementById('gramasi-select').value;
  const s = document.getElementById('series-select').value;
  return s.toLowerCase() + '_' + g + 'gr';
}

function download(filename, content, type) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type }));
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function exportCSV() {
  const data = getFiltered();
  const rows = [['tanggal_update', 'series', 'gramasi', 'harga_jual', 'harga_buyback']];
  data.forEach(r => rows.push([r.tanggal, r.series, r.gramasi, r.harga_jual, r.harga_buyback]));
  download('hrta_gold_' + getFilterLabel() + '.csv', rows.map(r => r.join(',')).join('\n'), 'text/csv');
}

function exportJSON() {
  const data = getFiltered();
  download('hrta_gold_' + getFilterLabel() + '.json', JSON.stringify(data, null, 2), 'application/json');
}

document.getElementById('gramasi-select').addEventListener('change', refresh);
document.getElementById('range-select').addEventListener('change', refresh);
document.getElementById('series-select').addEventListener('change', function() {
  const series = this.value;
  const gramasiSelect = document.getElementById('gramasi-select');
  const goldOptions = [
    ['0.1','0.1 gram'],['0.25','0.25 gram'],['0.5','0.5 gram'],['1','1 gram'],
    ['2','2 gram'],['5','5 gram'],['10','10 gram'],['25','25 gram'],
    ['50','50 gram'],['100','100 gram'],['125','125 gram'],['150','150 gram'],
    ['175','175 gram'],['200','200 gram'],['250','250 gram'],['500','500 gram'],['1000','1000 gram']
  ];
  const primeOptions = [['25','25 gram'],['50','50 gram'],['100','100 gram']];
  const options = series === 'Prime' ? primeOptions : goldOptions;
  const defaultVal = series === 'Prime' ? '25' : '1';
  gramasiSelect.innerHTML = options
    .map(([v, l]) => `<option value="${v}"${v === defaultVal ? ' selected' : ''}>${l}</option>`)
    .join('');
  setTimeout(refresh, 0);
});

loadCSV().then(data => {
  allData = data;
  refresh();
}).catch(() => {
  document.getElementById('table-wrap').innerHTML =
    '<div class="loading">Gagal memuat data. Pastikan USERNAME dan REPO sudah diganti.</div>';
});
</script>
</body>
</html>
